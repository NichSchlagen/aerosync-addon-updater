name: Bug Report
description: Report a bug or unexpected behavior in AeroSync Addon Updater.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below so we can
        investigate efficiently.

        **Do not report security vulnerabilities here.**
        Use [Private Vulnerability Reporting](https://github.com/NichSchlagen/aerosync-addon-updater/security/advisories/new) instead.

  - type: input
    id: version
    attributes:
      label: App Version
      description: Which version of AeroSync Addon Updater are you using?
      placeholder: e.g. 2.0.2
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (AppImage)
        - Linux (DEB)
        - Linux (RPM)
        - Windows (Setup)
        - Windows (Portable)
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Update Provider
      description: Which provider were you using when the bug occurred?
      options:
        - X-Updater
        - iniBuilds
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what happened.
      placeholder: Describe the bug…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Open the app
        2. Select profile "…"
        3. Click "Check for Updates"
        4. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics Export
      description: |
        Please attach the diagnostics JSON file from **Actions → Export Diagnostics…**
        It contains runtime info, an anonymized profile summary, and the current UI log.
        Drag & drop the file here or paste its contents.
      render: json
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Additional Logs / Error Messages
      description: Paste any other relevant log output or error messages not covered by the diagnostics export. **Redact credentials and personal paths.**
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, related issues, or anything else that might help.
    validations:
      required: false
